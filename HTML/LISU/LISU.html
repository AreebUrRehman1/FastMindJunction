<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <!--Icon-->
    <link rel="shortcut icon" type="x-icon" href="/Images/Repeated-Images/Logo.png">
    
    <!--CSS-->
    <link rel="stylesheet" href="../../CSS/general.css">
    <link rel="stylesheet" href="../../CSS/lisu.css">

</head>
<body>

<div class="LISU-box">

  <div class="LISU-design">

    <div class="SU-box">
      <div class="text">Sign in to FastMindJunction</div>
      <div class="text-body">Your Future Awaits. 🚀 Sign up and access powerful study tools to help you succeed. 📚</div>
      <form action="LISU.html" method="GET">
      <div class="un"><input placeholder="👤 Username" type="text" name="username" id="uec" required></div>
        <div class="error" id="username-error"></div>
        
      <div class="ea"><input placeholder="📧 Email" type="text" name="email" id="eec" required></div>
        <div class="error" id="email-error"></div>

      <div class="p"><input placeholder="🔑 Password" type="password" name="password" id="pec" required></div>
        <div class="error" id="password-error"></div>

      <div class="su"><button class="su-btn" type="submit">SIGN UP</button></div>
      </form>
    </div>

    <div class="r-box">
    <div class="r-text">Already have an account?</div>
    <button class="r-button" onclick="li()">Log In</button>
    </div>

    <div class="LI-box">
      <div class="text">Log in to FastMindJunction</div>
      <div class="text-body">Your Studies Await. 📖 Log in and get back to mastering your material. ✨</div>
      <div class="un"><input placeholder="👤 Username" type="text"></div>
      <div class="p"><input placeholder="🔑 Password" type="text"></div>
      <div class="li"><button class="su-btn login">LOG IN</button></div>
    </div>

  </div>

</div>

<script src="LISU.js"></script>
</body>
</html>
